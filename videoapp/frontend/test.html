<!DOCTYPE html>
<html>
<head>
  <title>API Test - AiVideoForge</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
    button { padding: 10px 20px; margin: 10px 0; cursor: pointer; background: #7c3aed; color: white; border: none; border-radius: 4px; }
    button:hover { background: #6d28d9; }
    #output { background: #0a0a0f; padding: 15px; border-radius: 4px; margin-top: 20px; white-space: pre-wrap; word-break: break-all; }
    .error { color: #ef4444; }
    .success { color: #10b981; }
  </style>
</head>
<body>
  <h1>AiVideoForge API Tester</h1>
  <button onclick="testHealth()">Test Health Endpoint</button>
  <button onclick="testGenerate()">Test Generate Endpoint</button>
  <button onclick="clearOutput()">Clear</button>
  
  <div id="output"></div>

  <script>
    const API_BASE = 'http://localhost:8000';
    const output = document.getElementById('output');

    function log(msg, isError = false) {
      const className = isError ? 'error' : 'success';
      output.innerHTML += `<div class="${className}">${new Date().toLocaleTimeString()} | ${msg}</div>`;
    }

    function clearOutput() {
      output.innerHTML = '';
    }

    async function testHealth() {
      log(`Testing ${API_BASE}/api/health...`);
      try {
        const res = await fetch(`${API_BASE}/api/health`);
        log(`Status: ${res.status}`, res.status !== 200);
        const data = await res.json();
        log(`Response: ${JSON.stringify(data)}`);
      } catch (e) {
        log(`Error: ${e.message}`, true);
      }
    }

    async function testGenerate() {
      const testPrompt = "A beautiful sunset over mountains";
      log(`Testing ${API_BASE}/api/generate with prompt: "${testPrompt}"`);
      try {
        const res = await fetch(`${API_BASE}/api/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: testPrompt })
        });
        log(`Status: ${res.status}`, res.status !== 200);
        const data = await res.json();
        log(`Response: ${JSON.stringify(data, null, 2)}`);
      } catch (e) {
        log(`Error: ${e.message}`, true);
      }
    }

    window.addEventListener('load', () => {
      log('API Tester Ready');
    });
  </script>
</body>
</html>
